<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Spoider Finds</title>
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .notfound {
      min-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .notfound .big { font-family: var(--font-display); font-size: clamp(4rem, 18vw, 8rem); color: var(--gold); line-height: 1; }
  </style>
</head>
<body>
  <main class="notfound">
    <span class="big">404</span>
    <h1 class="hero-title" style="font-size:1.7rem; margin-top:14px;">This thread doesn't lead anywhere.</h1>
    <p class="hero-sub" style="margin:14px auto 30px;">The page you're looking for was moved, renamed, or never existed.</p>
    <a href="index.html" class="btn btn-primary">Back to Spoider Finds</a>
  </main>

</html>
